name: Sync Zerodha to Monarch Money

on:
  schedule:
    - cron: "0 10 * * 1-5"  # 5 AM EST / 6 AM EDT, Mon-Fri — after Indian markets close (3:30 PM IST)
  workflow_dispatch:       # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install google-auth google-auth-httplib2 google-api-python-client

      - name: Run sync
        env:
          # Secrets
          GSHEET_SERVICE_ACCOUNT_JSON: ${{ secrets.GSHEET_SERVICE_ACCOUNT_JSON }}
          MONARCH_TOKEN: ${{ secrets.MONARCH_TOKEN }}
          # Config (override via repo variables if needed)
          GSHEET_SHEET_ID: ${{ vars.GSHEET_SHEET_ID }}
          GSHEET_TAB: ${{ vars.GSHEET_TAB }}
          GSHEET_LABEL: ${{ vars.GSHEET_LABEL }}
          MONARCH_ACCOUNT_NAME: ${{ vars.MONARCH_ACCOUNT_NAME }}
        run: python sync.py
